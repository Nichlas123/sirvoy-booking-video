<script type="text/babel">
const tween = (t, start, end, from, to, ease = Easing.easeOutCubic) => {
  if (t <= start) return from;
  if (t >= end) return to;
  const k = (t - start) / (end - start);
  return from + (to - from) * ease(k);
};
const clampK = (t, start, end) => Math.max(0, Math.min(1, (t - start) / Math.max(0.0001, end - start)));

const STAGE_W = 1080;
const STAGE_H = 1080;

const SirvoySymbol = ({ size = 54, radius = 14 }) => (

    <path d="M855.975 658.337C696.928 669.898 535.901 669.629 372.79 658.199C362.348 656.789 360.389 648.316 360.54 640.768C379.333 515.368 486.421 419.223 615.773 419.223C746.198 419.223 857.632 516.489 871.447 643.877C872.808 656.251 859.677 658.002 855.975 658.337Z" fill="white"/>

  </svg>
);

        <span style={{ fontSize: h * 0.22, fontWeight: 600, color: '#B67845', letterSpacing: 3, textTransform: 'uppercase', marginTop: h * 0.08 }}>Hotels</span>

};

const SidebarReal = ({ active = 'calendar' }) => {

const CH_LOGOS = {

  siteminder: 'channels/siteminder.png',
  myallocator: 'channels/myallocator.png',
  hostelworld: 'channels/hostelworld.png',
  agoda: 'channels/agoda.png',
  airbnb: 'channels/airbnb.png',
  expedia: 'channels/expedia.png',
};
const CH_NAMES = {

const TweaksContext = React.createContext({ single: '', double: '', queen: '' });

// ────────────────────────────── Scene 1: Booking engine ──────────────────────────────
// Timeline (0 → 7s):
//   0.0–1.4   Form fills: check-in, check-out, category, guests
//   1.4–1.7   Search pulse
//   1.7–2.6   Room cards appear
//   2.6–3.2   "+" button on Single room pulses; row expands revealing Room dropdown + price
//   3.2–3.7   Total bar slides up from bottom, Next pulses
//   3.7–4.8   Card flips to guest-details view (name, email, phone fill in)
//   4.8–5.2   Book now pulses
//   5.2–7.0   Book now → ✓ Booked! confirmation
const Scene1_Booking = () => {
  const { localTime: t } = useSprite();
  const roomImages = React.useContext(TweaksContext);
  const fill = (start) => tween(t, start, start + 0.25, 0, 1);
  const cardOpacity = tween(t, 0, 0.4, 0, 1);

  const rooms = [
    { name: 'Single room', price: '€148', id: 'single', img: roomImages.single || 'channels/room-single.jpg' },
    { name: 'Double room', price: '€198', id: 'double', img: roomImages.double || 'channels/room-double.jpg' },
    { name: 'Queen room', price: '€244', id: 'queen', img: roomImages.queen || 'channels/room-queen.jpg' },
  ];

  // Flip from step 1 (room select) → step 2 (guest details)
  const flipK = clampK(t, 3.55, 3.95); // 0 → 1
  const showDetails = flipK > 0.5;

  // "+" expand for Single row
  const expandK = clampK(t, 2.55, 3.1);

  // Total bar reveal
  const totalK = clampK(t, 3.15, 3.5);
  const nextPulse = t > 3.45 && t < 3.65;

  // Book pulse & confirm
  const bookPulse = t > 5.0 && t < 5.2;
  const booked = t > 5.2;

  return (
    <div style={{
      position: 'absolute', inset: 0,
      background: '#FAF7F2',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>
      {/* Phone bezel — fills the stage vertically */}
      <div style={{
        width: 480, height: 960,
        background: '#0B0F14',
        borderRadius: 64,
        padding: 14,
        boxShadow: '0 40px 80px rgba(14,34,53,0.28), 0 10px 24px rgba(14,34,53,0.14)',
        position: 'relative',
        opacity: cardOpacity,
        transform: `translateY(${tween(t, 0, 0.5, 20, 0)}px) scale(${0.98 + 0.02 * cardOpacity})`,
      }}>
        {/* Side buttons */}
        <div style={{ position: 'absolute', left: -3, top: 130, width: 3, height: 32, background: '#0B0F14', borderRadius: '2px 0 0 2px' }} />
        <div style={{ position: 'absolute', left: -3, top: 180, width: 3, height: 54, background: '#0B0F14', borderRadius: '2px 0 0 2px' }} />
        <div style={{ position: 'absolute', left: -3, top: 250, width: 3, height: 54, background: '#0B0F14', borderRadius: '2px 0 0 2px' }} />
        <div style={{ position: 'absolute', right: -3, top: 200, width: 3, height: 80, background: '#0B0F14', borderRadius: '0 2px 2px 0' }} />

        {/* Screen */}
        <div style={{
          width: '100%', height: '100%',
          background: 'white',
          borderRadius: 42,
          overflow: 'hidden',
          position: 'relative',
          display: 'flex', flexDirection: 'column',
        }}>
          {/* Status bar */}
          <div style={{
            height: 46, flexShrink: 0,
            display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between',
            padding: '0 26px 6px',
            fontSize: 14, fontWeight: 700, color: TOKENS.text,
            position: 'relative',
          }}>
            <span>9:41</span>
            {/* Dynamic island */}
            <div style={{
              position: 'absolute', left: '50%', top: 8,
              transform: 'translateX(-50%)',
              width: 110, height: 30, borderRadius: 20,
              background: '#0B0F14',
            }} />
            <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
              {/* signal */}
              <svg width="16" height="10" viewBox="0 0 16 10"><g fill={TOKENS.text}><rect x="0" y="7" width="3" height="3" rx="0.5" /><rect x="4" y="5" width="3" height="5" rx="0.5" /><rect x="8" y="3" width="3" height="7" rx="0.5" /><rect x="12" y="0" width="3" height="10" rx="0.5" /></g></svg>
              {/* wifi */}
              <svg width="15" height="10" viewBox="0 0 15 10"><path d="M7.5 8.5a1 1 0 110 2 1 1 0 010-2zM2.5 4.5a7 7 0 0110 0l-1.4 1.4a5 5 0 00-7.2 0L2.5 4.5zM0 2a10 10 0 0115 0l-1.4 1.4a8 8 0 00-12.2 0L0 2z" fill={TOKENS.text} /></svg>
              {/* battery */}
              <svg width="24" height="11" viewBox="0 0 24 11"><rect x="0.5" y="0.5" width="20" height="10" rx="2.5" fill="none" stroke={TOKENS.text} strokeOpacity="0.4" /><rect x="2" y="2" width="16" height="7" rx="1.5" fill={TOKENS.text} /><rect x="21" y="3.5" width="1.5" height="4" rx="0.5" fill={TOKENS.text} opacity="0.4" /></svg>
            </div>
          </div>

          {/* Content — booking card, full screen width */}
          <div style={{
            flex: 1, background: '#F4F6F8',
            padding: '10px 14px 0',
            position: 'relative',
            overflow: 'hidden',
          }}>
          <div style={{
            width: '100%', background: 'white', borderRadius: 16,
            boxShadow: '0 6px 20px rgba(14,34,53,0.06), 0 1px 2px rgba(14,34,53,0.04)',
            border: `1px solid ${TOKENS.line}`,
            overflow: 'hidden',
            position: 'relative',
            paddingBottom: 72,
            height: '100%',
          }}>
        {/* Perspective wrapper for flip */}
        <div style={{ perspective: 1200, padding: '24px 24px 0' }}>
          <div style={{
            transformStyle: 'preserve-3d',
            transition: 'transform 0.1s linear',
            transform: `rotateY(${flipK * 180}deg)`,
            position: 'relative',
          }}>
            {/* FRONT — Room selection */}
            <div style={{
              backfaceVisibility: 'hidden',
              opacity: showDetails ? 0 : 1,
            }}>
              <div style={{ fontSize: 22, fontWeight: 800, marginBottom: 12, letterSpacing: -0.3, color: TOKENS.text }}>New Booking</div>

              {/* Search form */}
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                {[
                  { label: 'Check-in', value: 'Thu 14 Oct', start: 0.3 },
                  { label: 'Check-out', value: 'Fri 15 Oct', start: 0.5 },
                  { label: 'Category', value: 'All', start: 0.7 },
                  { label: 'Number of guests', value: '1 adult', start: 0.9 },
                ].map((f, i) => {
                  const k = fill(f.start);
                  return (
                    <div key={i} style={{
                      border: `1.5px solid ${TOKENS.line}`, borderRadius: 8, padding: '8px 12px',
                      background: 'white',
                    }}>
                      <div style={{ fontSize: 11, fontWeight: 600, color: TOKENS.text }}>{f.label}</div>
                      <div style={{
                        height: 10, borderRadius: 3, marginTop: 5,
                        background: `linear-gradient(90deg, #E5E7EB ${k * 100}%, #F3F4F6 ${k * 100}%)`,
                        width: k > 0 ? `${60 + i * 6}%` : '40%',
                        transition: 'width 0.2s',
                      }} />
                    </div>
                  );
                })}
              </div>

              {/* Search button */}
              <div style={{
                marginTop: 12, height: 42, borderRadius: 8,
                background: '#1E6E3E', color: 'white',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontWeight: 700, fontSize: 14,
                opacity: tween(t, 1.1, 1.4, 0, 1),
                transform: `scale(${t > 1.55 && t < 1.75 ? 0.97 : 1})`,
                transition: 'transform 0.1s',
              }}>Search</div>

              {/* Rooms list */}
              <div style={{ marginTop: 14, display: 'flex', flexDirection: 'column', gap: 10 }}>
                {rooms.map((r, i) => {
                  const appear = tween(t, 1.8 + i * 0.12, 2.1 + i * 0.12, 0, 1);
                  const isSingle = i === 0;
                  return (
                    <div key={r.id} style={{
                      opacity: appear,
                      transform: `translateY(${(1 - appear) * 8}px)`,
                    }}>
                      {/* Room card */}
                      <div style={{
                        display: 'flex', alignItems: 'center', gap: 12,
                        padding: 10, borderRadius: 10,
                        border: `1px solid ${TOKENS.line}`,
                        background: 'white',
                      }}>
                        <img src={r.img} alt={r.name} style={{
                          width: 76, height: 58, borderRadius: 8, flexShrink: 0,
                          objectFit: 'cover', display: 'block',
                        }} />
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: 700, fontSize: 14 }}>{r.name}</div>
                          <div style={{ display: 'flex', gap: 4, marginTop: 6 }}>
                            {[0, 1, 2].map(d => (
                              <div key={d} style={{ height: 10, width: 28, background: '#EDEEF0', borderRadius: 3 }} />
                            ))}
                          </div>
                          <div style={{ height: 5, background: '#EDEEF0', borderRadius: 3, width: '75%', marginTop: 6 }} />
                        </div>
                      </div>
                      {/* "+" add → expanded detail (only for Single, first room) */}
                      {isSingle && (
                        <>
                          <div style={{
                            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                            marginTop: 10,
                          }}>
                            <div style={{
                              width: 32, height: 32, borderRadius: '50%',
                              background: expandK > 0.5 ? '#1E6E3E' : '#0E2235',
                              color: 'white',
                              display: 'grid', placeItems: 'center',
                              fontSize: 18, fontWeight: 600, lineHeight: 1,
                              transform: `scale(${t > 2.55 && t < 2.75 ? 0.9 : 1})`,
                              transition: 'background 0.2s, transform 0.12s',
                            }}>{expandK > 0.5 ? '✓' : '+'}</div>
                            <div style={{ textAlign: 'right' }}>
                              <span style={{ fontSize: 16, fontWeight: 800, color: TOKENS.text }}>€148.00</span>
                              <span style={{ fontSize: 12, color: TOKENS.mute, fontWeight: 500, marginLeft: 4 }}>/ night</span>
                            </div>
                          </div>
                          {/* Room dropdown — appears after + */}
                          <div style={{
                            marginTop: 10,
                            height: expandK * 48,
                            opacity: expandK,
                            overflow: 'hidden',
                            transition: 'none',
                          }}>
                            <div style={{
                              display: 'flex', alignItems: 'stretch',
                              border: `1px solid ${TOKENS.line}`, borderRadius: 8,
                              overflow: 'hidden',
                            }}>
                              <div style={{
                                padding: '12px 14px', fontSize: 13, fontWeight: 600,
                                background: '#F4F6F8', color: TOKENS.mute,
                                borderRight: `1px solid ${TOKENS.line}`,
                              }}>Room</div>
                              <div style={{
                                flex: 1, padding: '12px 14px', fontSize: 13,
                                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                                color: TOKENS.text, fontWeight: 600,
                              }}>
                                <span>Room 2 <span style={{ color: TOKENS.mute, fontWeight: 500 }}>(Cleaned)</span></span>
                                <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 4l4 4 4-4" stroke={TOKENS.mute} strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round" /></svg>
                              </div>
                            </div>
                          </div>
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* BACK — Your Booking Details (review) */}
            <div style={{
              position: 'absolute', inset: 0,
              backfaceVisibility: 'hidden',
              transform: 'rotateY(180deg)',
              opacity: showDetails ? 1 : 0,
            }}>
              <div style={{ fontSize: 20, fontWeight: 800, marginBottom: 16, letterSpacing: -0.3, color: TOKENS.text }}>Your Booking Details</div>

              {/* Top grid: check-in/out, nights, guests */}
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', rowGap: 14, columnGap: 24, marginBottom: 14 }}>
                {[
                  { label: 'Check-in',          w: 96 },
                  { label: 'Check-out',         w: 96 },
                  { label: 'Nights',            w: 28 },
                  { label: 'Number of guests',  w: 28 },
                ].map((f, i) => (
                  <div key={i}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: TOKENS.mute }}>{f.label}</div>
                    <div style={{
                      height: 8, borderRadius: 3, marginTop: 6,
                      background: '#E5E7EB', width: f.w,
                    }} />
                  </div>
                ))}
              </div>

              {/* Total row */}
              <div style={{
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                padding: '12px 0',
                borderTop: `1px solid ${TOKENS.line}`,
                borderBottom: `1px solid ${TOKENS.line}`,
              }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: TOKENS.mute }}>Total (EUR)</div>
                <div style={{ fontSize: 18, fontWeight: 800, color: TOKENS.text }}>€148.00</div>
              </div>

              {/* Guest details section */}
              <div style={{ fontSize: 16, fontWeight: 800, color: TOKENS.text, marginTop: 16, marginBottom: 10 }}>Guest Details</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 10 }}>
                {[0, 1, 2, 3].map(i => (
                  <div key={i} style={{
                    height: 28, borderRadius: 6, background: '#EDEEF0',
                  }} />
                ))}
              </div>
              <div style={{
                height: 84, borderRadius: 6, background: '#EDEEF0',
                display: 'flex', flexDirection: 'column', justifyContent: 'center',
                padding: '0 12px', gap: 6,
              }}>
                <div style={{ height: 6, background: '#DFE1E5', borderRadius: 3, width: '88%' }} />
                <div style={{ height: 6, background: '#DFE1E5', borderRadius: 3, width: '72%' }} />
                <div style={{ height: 6, background: '#DFE1E5', borderRadius: 3, width: '60%' }} />
              </div>
            </div>
          </div>
        </div>

        {/* Bottom sticky bar — Total + Next/Book */}
        <div style={{
          position: 'absolute', left: 0, right: 0, bottom: 0,
          height: 64, borderTop: `1px solid ${TOKENS.line}`,
          background: 'white',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '0 16px 0 20px',
          transform: `translateY(${(1 - totalK) * 64}px)`,
          opacity: totalK,
        }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: TOKENS.mute, textTransform: 'uppercase', letterSpacing: 0.4 }}>Total (EUR)</div>
            <div style={{ fontSize: 20, fontWeight: 800, color: TOKENS.text, marginTop: 2 }}>€148.00</div>
          </div>
          {!showDetails ? (
            <div style={{
              height: 44, padding: '0 28px', borderRadius: 8,
              background: '#0E2235', color: 'white',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontWeight: 700, fontSize: 14,
              transform: `scale(${nextPulse ? 0.96 : 1})`,
              transition: 'transform 0.1s',
            }}>Next →</div>
          ) : (
            <div style={{
              height: 44, padding: '0 28px', borderRadius: 8,
              background: booked ? TOKENS.green : '#1E6E3E',
              color: 'white',
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
              fontWeight: 700, fontSize: 14,
              transform: `scale(${bookPulse ? 0.96 : 1})`,
              transition: 'background 0.25s, transform 0.1s',
            }}>
              {booked && <Icon name="check" size={14} color="white" strokeWidth={3} />}
              {booked ? 'Booked!' : 'Book Now'}
            </div>
          )}
        </div>
          </div>
          </div>

          {/* Home indicator */}
          <div style={{
            position: 'absolute', bottom: 7, left: '50%', transform: 'translateX(-50%)',
            width: 134, height: 5, borderRadius: 3, background: '#0B0F14',
          }} />
        </div>
      </div>
    </div>
  );
};

// ────────────────────────────── Scene 2: Calendar arrival ──────────────────────────────
const ROOM_TYPES_V = ['Single', 'Double', 'Queen', 'King', 'Deluxe', 'Twin'];
const BAR_V = {
  teal: { bg: TOKENS.teal, fg: 'white' },
  tealSoft: { bg: TOKENS.tealSoft, fg: TOKENS.navy },
  amber: { bg: TOKENS.amber, fg: TOKENS.navy },
};

const Scene2_CalendarArrival = () => {
  const { localTime: t } = useSprite();
  const barAppear = tween(t, 1.0, 1.8, 0, 1);
  const toastIn = tween(t, 0.3, 0.9, 0, 1);
  const toastOut = tween(t, 4.3, 5.3, 1, 0, Easing.easeInQuad);
  const toastOpacity = Math.min(toastIn, toastOut);
  const hiK = clampK(t, 1.0, 1.6) * (1 - clampK(t, 3.0, 3.8));

  // Swap animation: around t=3.0-4.2s, drag "Ava M." (row 3, s:4) to row 4's empty slot at s:5-6, and move "James Brook" (row 4) down a day.
  // Demonstrates the calendar is a live working tool.
  const swapK = clampK(t, 3.0, 4.0);

const Packet = ({ from, to, t, delay, color, label }) => {
  const local = clampK(t, delay, delay + 1.2);
  if (local <= 0 || local >= 1) return null;
  const eased = Easing.easeInOutCubic(local);
  const x = from.x + (to.x - from.x) * eased;
  const y = from.y + (to.y - from.y) * eased;
  const opacity = local < 0.1 ? local / 0.1 : local > 0.9 ? (1 - local) / 0.1 : 1;
  return (
    <div style={{
      position: 'absolute', left: x, top: y,
      width: 28, height: 28, borderRadius: '50%',
      background: color, color: 'white',
      display: 'grid', placeItems: 'center',
      fontSize: 13, fontWeight: 700,
      boxShadow: `0 4px 20px ${color}88`,
      opacity, transform: 'translate(-50%, -50%)',
    }}>{label}</div>
  );
};

const Scene3_Fanout = () => {
  const { localTime: t } = useSprite();
  const hub = { x: STAGE_W / 2, y: STAGE_H / 2 + 20 };
  const channelList = ['booking', 'expedia', 'airbnb', 'agoda', 'hostelworld', 'myallocator', 'siteminder'];
  const N = channelList.length;
  const channels = channelList.map((id, i) => ({
    id,
    angle: -90 + i * (360 / N),
  }));
  const R = 310;
  const nodePos = (angle) => ({
    x: hub.x + Math.cos(angle * Math.PI / 180) * R,
    y: hub.y + Math.sin(angle * Math.PI / 180) * R,
  });
  const confirmAt = {};
  channelList.forEach((id, i) => { confirmAt[id] = 1.3 + i * 0.22; });

  return (
    <div style={{
      position: 'absolute', inset: 0, overflow: 'hidden',
      background: `
        radial-gradient(ellipse at 50% 52%, rgba(248,124,86,0.06) 0%, rgba(248,124,86,0) 40%),

          // Control point: midpoint pulled slightly toward a perpendicular offset for a gentle arc
          const mx = (hub.x + p.x) / 2;
          const my = (hub.y + p.y) / 2;
          const dx = p.x - hub.x, dy = p.y - hub.y;
          const len = Math.hypot(dx, dy);
          const nx = -dy / len, ny = dx / len;
          const bow = 22;
          const cx = mx + nx * bow;

          const path = `M ${hub.x} ${hub.y} Q ${cx} ${cy} ${p.x} ${p.y}`;

      </div>

      {channels.map(c => {

        const enter = clampK(t, 0.1, 0.7);
        return (

            transition: 'border-color 0.3s, box-shadow 0.3s',
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12,
          }}>
            <div style={{ height: 44, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>

// Custom file input — converts to a data URL so the tweak persists across reloads.
function RoomImageTweak({ label, value, onChange }) {
  const inputRef = React.useRef(null);
  const onFile = (e) => {
    const f = e.target.files && e.target.files[0];

    const reader = new FileReader();
    reader.onload = () => onChange(String(reader.result));
    reader.readAsDataURL(f);

  return (
    <div style={{ padding: '10px 12px', borderBottom: '1px solid rgba(14,34,53,0.08)' }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: '#0E2235', letterSpacing: 0.2, marginBottom: 6 }}>{label}</div>

          background: value ? `url(${value}) center/cover` : '#F0F2F5',

          flexShrink: 0,
        }} />
        <button
          onClick={() => inputRef.current && inputRef.current.click()}
          style={{
            flex: 1, height: 28, borderRadius: 6, border: '1px solid rgba(14,34,53,0.15)',
            background: 'white', fontSize: 11, fontWeight: 600, color: '#0E2235', cursor: 'pointer',
          }}>{value ? 'Replace' : 'Upload'}</button>
        {value && (
          <button onClick={() => onChange('')} style={{
            height: 28, padding: '0 8px', borderRadius: 6, border: '1px solid rgba(14,34,53,0.15)',

// Record the screen via getDisplayMedia + MediaRecorder.
// Downscales/crops to exactly 1080x1080 via an offscreen canvas so the
// downloaded file is always 1080x1080 regardless of the source tab size.
async function recordVideo(durationSec = 22) {
  try {
    const stream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: 30 },
      audio: false,
    });

    // Create a video element we can read frames from
    const srcVideo = document.createElement('video');
    srcVideo.srcObject = stream;
    srcVideo.muted = true;
    await srcVideo.play();
    await new Promise(r => srcVideo.onloadedmetadata = r);

    // Offscreen canvas at exactly 1080x1080
    const canvas = document.createElement('canvas');
    canvas.width = 1080;
    canvas.height = 1080;
    const ctx = canvas.getContext('2d');

    // Draw loop: letterbox/cover the source into 1080x1080
    let running = true;
    const drawLoop = () => {
      if (!running) return;
      const sw = srcVideo.videoWidth;
      const sh = srcVideo.videoHeight;
      if (sw && sh) {
        // Cover: fill the 1080x1080 square, cropping overflow
        const scale = Math.max(1080 / sw, 1080 / sh);
        const dw = sw * scale;
        const dh = sh * scale;
        const dx = (1080 - dw) / 2;
        const dy = (1080 - dh) / 2;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, 1080, 1080);
        ctx.drawImage(srcVideo, dx, dy, dw, dh);
      }
      requestAnimationFrame(drawLoop);
    };
    drawLoop();

    // Record the canvas stream
    const canvasStream = canvas.captureStream(30);
    const mimeCandidates = [
      'video/mp4;codecs=avc1.42E01E',
      'video/mp4',
      'video/webm;codecs=vp9',
      'video/webm;codecs=vp8',
      'video/webm',
    ];
    const mimeType = mimeCandidates.find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';
    const isMp4 = mimeType.startsWith('video/mp4');
    const recorder = new MediaRecorder(canvasStream, { mimeType, videoBitsPerSecond: 12_000_000 });
    const chunks = [];
    recorder.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
    const stopped = new Promise((resolve) => recorder.onstop = resolve);
    recorder.start();

    setTimeout(() => {
      recorder.stop();
      running = false;
      stream.getTracks().forEach(t => t.stop());
      canvasStream.getTracks().forEach(t => t.stop());
    }, durationSec * 1000 + 200);

    await stopped;
    const blob = new Blob(chunks, { type: mimeType });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = isMp4 ? 'sirvoy-hero.mp4' : 'sirvoy-hero.webm';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch (err) {
    alert('Recording failed or was cancelled.\n\n' + (err && err.message || err));
  }
}

        <div style={{ padding: '0 12px 12px' }}>
          <button
            onClick={() => recordVideo(11)}
            style={{
              width: '100%', height: 34, borderRadius: 6,
              background: '#0E2235', color: 'white', border: 'none',
              fontWeight: 700, fontSize: 12, cursor: 'pointer',
            }}>Record &amp; Download (11s)</button>
        </div>
        <TweakSection label="Export background" />
        <TweakRadio label="Background" value={tw.bgMode}
                    options={['green', 'cream', 'navy', 'none']}
                    onChange={(v) => setTweak('bgMode', v)} />
        <TweakSection label="Room photos" />
        <RoomImageTweak label="Single room" value={tw.singleImg} onChange={(v) => setTweak('singleImg', v)} />
        <RoomImageTweak label="Double room" value={tw.doubleImg} onChange={(v) => setTweak('doubleImg', v)} />
        <RoomImageTweak label="Queen room"  value={tw.queenImg}  onChange={(v) => setTweak('queenImg', v)} />
      </TweaksPanel>
    </TweaksContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
